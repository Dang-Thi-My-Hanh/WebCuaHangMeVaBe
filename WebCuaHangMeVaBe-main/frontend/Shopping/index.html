<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Baby Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<header class="header-page">
    <div class="header-container">
        <div class="logo-circle">Logo</div>
        <div class="search-bar">
            <input type="text" placeholder="Bạn cần tìm gì?">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="header-actions">
            <a href="#"><i class="fa-solid fa-circle-user"></i> Đăng nhập</a>
            <a href="#" class="cart-link active">
                <i class="fa-solid fa-cart-shopping"></i> Giỏ hàng
            </a>
            <a href="#"><i class="fa-solid fa-bell"></i></a>
        </div>
    </div>
</header>

<main class="cart-container">
    <div class="cart-left">
        <div class="cart-header">
            <span class="col-product">Sản phẩm</span>
            <span>Đơn giá</span>
            <span>Size</span>
            <span>Số lượng</span>
            <span>Thành tiền</span>
        </div>

        <div class="cart-item">
            <div class="col-product">
                <input type="checkbox" checked>
                <img src="https://via.placeholder.com/80" alt="product">
                <span class="item-name">Áo polo thể dục</span>
            </div>
            <div class="col-price">112.000 VNĐ</div>
            <div class="col-size">
                <select>
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                </select>
            </div>
            <div class="col-quantity">
                <div class="q-btn">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                </div>
            </div>
            <div class="col-total">
                112.000 VNĐ
                <i class="fa-solid fa-trash-can delete-icon"></i>
            </div>
        </div>

    </div>

    <div class="cart-right">
        <div class="summary-box">
            <h3>Địa chỉ nhận hàng</h3>
            <button class="btn-location"><i class="fa-solid fa-location-dot"></i> Xác định địa chỉ nhận hàng</button>
        </div>

        <div class="summary-box">
            <h3>Mã giảm giá</h3>
            <button class="btn-coupon"><i class="fa-solid fa-ticket"></i> Bấm vào để chọn hoặc nhập mã</button>
        </div>

        <div class="summary-box total-box">
            <div class="price-row">
                <span>Tính tạm</span>
                <span>112.000 VNĐ</span>
            </div>
            <div class="price-row discount">
                <span>Giảm giá sản phẩm</span>
                <span>-12.000 VNĐ</span>
            </div>
            <hr>
            <div class="price-row final">
                <strong>Tổng tiền</strong>
                <strong class="total-price">100.000 VNĐ</strong>
            </div>
            <p class="vat-note">(Đã bao gồm VAT)</p>
            <button class="btn-checkout">Thanh toán</button>
        </div>
    </div>
</main>
</body>
</html>
