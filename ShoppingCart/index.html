<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link rel="stylesheet" href="CSS/styleShoppingCart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="cart-body">

<!-- Header xanh lá theo ảnh mẫu -->
<header class="header-main-green">
    <div class="header-content">
        <div class="logo-pink-circle">Logo</div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" placeholder="Bạn cần tìm gì?">
        </div>
        <div class="header-user-actions">
            <div class="action-item"><i class="fa-solid fa-circle-user"></i> Đăng nhập</div>
            <div class="action-divider"></div>
            <div class="action-item"><i class="fa-solid fa-cart-shopping"></i> Giỏ hàng</div>
            <div class="action-item"><i class="fa-solid fa-bell"></i></div>
        </div>
    </div>
</header>

<main class="cart-wrapper">
    <div class="cart-container-main">

        <!-- Cột trái: Bảng sản phẩm nằm trong thẻ trắng bo góc -->
        <div class="cart-left-white-card">
            <div class="cart-table-header">
                <div class="col-name">Sản phẩm</div>
                <div class="col-price">Đơn giá</div>
                <div class="col-size">Size</div>
                <div class="col-qty">Số lượng</div>
                <div class="col-total">Thành tiền</div>
            </div>

            <!-- Sản phẩm 1 -->
            <div class="cart-product-row">
                <div class="col-name prod-cell">
                    <input type="checkbox" class="custom-check">
                    <img src="https://via.placeholder.com/60" alt="sp">
                    <span class="p-name">Áo polo thể dục</span>
                </div>
                <div class="col-price price-blue">112.000 VNĐ</div>
                <div class="col-size size-list">
                    <span>S</span>
                    <span>M</span>
                    <span>L</span>
                </div>
                <div class="col-qty qty-list">
                    <div class="qty-control"><span>-</span> 1 <span>+</span></div>
                    <div class="qty-control"><span>-</span> 5 <span>+</span></div>
                    <div class="qty-control"><span>-</span> 6 <span>+</span></div>
                </div>
                <div class="col-total total-cell">
                    <div class="total-blue">112.000 VNĐ</div>
                    <button class="delete-btn-red"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
            <!-- Có thể copy thêm dòng sản phẩm tại đây -->
        </div>

        <!-- Cột phải: Các thẻ thông tin -->
        <div class="cart-right-summary">
            <div class="summary-card">
                <h3>Địa chỉ nhận hàng</h3>
                <button class="btn-action-light">
                    <i class="fa-solid fa-location-dot"></i> Xác định địa chỉ nhận hàng
                </button>
            </div>

            <div class="summary-card">
                <h3>Mã giảm giá</h3>
                <button class="btn-action-light">
                    <i class="fa-solid fa-ticket"></i> Bấm vào để chọn hoặc nhập mã giảm giá
                </button>
            </div>

            <div class="summary-card payment-details">
                <div class="pay-row">
                    <span>Tính tạm</span>
                    <span class="bold">112.000 VNĐ</span>
                </div>
                <div class="pay-row pink-txt">
                    <span>Giảm giá sản phẩm</span>
                    <span>12.000 VNĐ</span>
                </div>
                <hr>
                <div class="pay-row total-final">
                    <span>Tổng tiền</span>
                    <div class="right-align">
                        <span class="bold">100.000 VNĐ</span>
                        <small>(Đã bao gồm VAT)</small>
                    </div>
                </div>
                <button class="btn-pay-now">Thanh toán</button>
            </div>
        </div>
    </div>
</main>

<!-- Footer xanh lá dưới cùng -->
<footer class="footer-green-bar"></footer>

</body>
</html>
