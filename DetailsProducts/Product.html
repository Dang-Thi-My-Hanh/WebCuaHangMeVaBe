<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Store - Đồ dùng cho Mẹ và Bé</title>
    <link rel="stylesheet" href="CSS/styleProduct.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div class="page">
    <header class="header-page">
        <div class="header-container">
            <div class="logo">
                <div class="logo-circle">Logo</div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Bạn cần tìm gì?">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="header-actions">
                <a href="#"><i class="fa-solid fa-circle-user"></i> Đăng nhập</a>
                <a href="#" class="cart-link">
                    <i class="fa-solid fa-cart-shopping"></i> Giỏ hàng
                    <span class="badge">0</span>
                </a>
                <a href="#"><i class="fa-solid fa-bell"></i></a>
            </div>
        </div>
    </header>

    <main class="container">
        <nav class="breadcrumb">
            <a href="#">Trang chủ</a> / <a href="#">Thời trang bé trai</a> / <span>Bộ quần áo Polo</span>
        </nav>

        <section class="product-detail">
            <div class="product-gallery">
                <div class="main-image">
                    <img src="https://via.placeholder.com/600x600" alt="Sản phẩm chính">
                    <button class="nav-prev"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="nav-next"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="thumbnail-list">
                    <div class="thumb active"><img src="https://via.placeholder.com/100" alt="thumb"></div>
                    <div class="thumb"><img src="https://via.placeholder.com/100" alt="thumb"></div>
                    <div class="thumb"><img src="https://via.placeholder.com/100" alt="thumb"></div>
                    <div class="thumb"><img src="https://via.placeholder.com/100" alt="thumb"></div>
                </div>
            </div>

            <div class="product-info">
                <h1 class="price-main">300.000đ</h1>
                <h2 class="product-title">Bộ quần áo Polo trẻ em phong cách Hàn Quốc - Chất liệu Cotton 100%</h2>

                <div class="rating-share">
                    <span class="stars">4.0 ★★★★☆</span>
                    <span class="review-count">Đánh giá: 145</span>
                </div>

                <div class="shipping-info">
                    <p><i class="fa-solid fa-truck-fast"></i> Giao hàng: Dự kiến nhận hàng 17 Dec - 19 Dec</p>
                </div>

                <div class="options">
                    <label>Size:</label>
                    <div class="size-btns">
                        <button class="active" data-price="300.000đ">S</button>
                        <button data-price="320.000đ">M</button>
                        <button data-price="340.000đ">L</button>
                        <button data-price="360.000đ">XL</button>
                    </div>
                </div>

                <div class="quantity">
                    <label>Số lượng:</label>
                    <div class="q-control">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </div>

                <div class="buy-actions">
                    <button class="btn-cart-outline"><i class="fa-solid fa-cart-plus"></i></button>
                    <button class="btn-buy-now">Mua hàng</button>
                </div>
            </div>
        </section>

        <section class="related-products">
            <h3 class="section-title">Sản phẩm tương tự</h3>
            <div class="product-grid">
                <div class="p-card">
                    <img src="https://via.placeholder.com/200" alt="sp">
                    <h4>Áo polo thể dục</h4>
                    <p class="p-price">112.000 VNĐ</p>
                    <button class="add-quick"><i class="fa-solid fa-cart-shopping"></i></button>
                </div>
            </div>
        </section>
    </main>

</div>

</body>
</html>
